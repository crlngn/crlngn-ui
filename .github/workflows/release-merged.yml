name: Release Merged Package (v13 + v14)

# Builds the merged-versions branch (v14 bundle + generation loader) together with
# the v13 bundle from the legacy branch, merges both into a single dist, and
# publishes one release that installs on Foundry v13 and v14+ alike.

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  V13_BRANCH: v2

jobs:
  release:
    if: github.event.release.target_commitish == 'merged-versions'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout merged-versions
        uses: actions/checkout@v3

      - name: Checkout v13 source branch
        uses: actions/checkout@v3
        with:
          ref: v2
          path: v13-src

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build v14 bundle and loader
        run: |
          npm ci --ignore-scripts
          npm run build

      - name: Build v13 bundle
        working-directory: v13-src
        run: |
          npm ci --ignore-scripts
          WATCH_MODE=true CRLNGN_BUILD_TARGET=v13 npx vite build

      - name: Verify shared files match between branches
        run: |
          if ! diff -rq dist/templates v13-src/dist/templates; then
            echo "::error::Templates differ between merged-versions and $V13_BRANCH. Shared dist/templates would break one build - namespace them per generation before releasing."
            exit 1
          fi
          if ! diff -rq dist/assets v13-src/dist/assets; then
            echo "::error::Assets differ between merged-versions and $V13_BRANCH. Shared dist/assets would break one build - namespace them per generation before releasing."
            exit 1
          fi

      - name: Merge v13 build into package
        run: |
          mkdir -p dist/scripts/v13
          cp -R v13-src/dist/scripts/v13/. dist/scripts/v13/
          cp v13-src/dist/styles/crlngn-ui-v13.css* dist/styles/
          node tools/merge-lang.mjs dist/lang v13-src/dist/lang

      - name: Extract Version and Compatibility
        run: |
          REPO_NAME=$(basename $GITHUB_REPOSITORY)
          VERSION=$(jq -r .version dist/module.json)
          MIN_VERSION=$(jq -r .compatibility.minimum dist/module.json)
          VERIFIED_VERSION=$(jq -r .compatibility.verified dist/module.json)
          MAX_VERSION=$(jq -r .compatibility.maximum dist/module.json)
          echo "REPO_NAME=$REPO_NAME" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "MIN_VERSION=$MIN_VERSION" >> $GITHUB_ENV
          echo "VERIFIED_VERSION=$VERIFIED_VERSION" >> $GITHUB_ENV
          echo "MAX_VERSION=$MAX_VERSION" >> $GITHUB_ENV

      - name: Prepare Release Artifacts
        run: |
          mv dist "$REPO_NAME"
          zip -r module.zip "$REPO_NAME"
          mv "$REPO_NAME" dist

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            module.zip
            dist/module.json
            news/module-updates.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Release to FoundryVTT
        env:
          FOUNDRY_PACKAGE_API_KEY: ${{ secrets.FOUNDRY_PACKAGE_API_KEY }}
        run: |
          echo "Publishing merged release ($VERSION) to FoundryVTT..."
          API_RESPONSE=$(curl -s -X POST "https://foundryvtt.com/_api/packages/release_version/" \
            -H "Content-Type: application/json" \
            -H "Authorization: $FOUNDRY_PACKAGE_API_KEY" \
            -d '{
              "id": "'"$REPO_NAME"'",
              "release": {
                "version": "'"$VERSION"'",
                "manifest": "https://raw.githubusercontent.com/${{ github.repository }}/merged-versions/dist/module.json",
                "notes": "https://github.com/${{ github.repository }}/releases/tag/v'"$VERSION"'",
                "compatibility": {
                  "minimum": "${{env.MIN_VERSION}}",
                  "verified": "${{env.VERIFIED_VERSION}}",
                  "maximum": "${{env.MAX_VERSION}}"
                }
              }
            }')
          echo "Release API Response: $API_RESPONSE"

  notify_discord:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Get Release Info
        id: get_release
        uses: actions/github-script@v6
        with:
          script: |
            const release = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: context.payload.release.id
            });
            const releaseData = {
              body: release.data.body || "No release notes provided"
            };
            return JSON.stringify(releaseData);
          result-encoding: string

      - name: Send Discord Notification
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            **New Release for Carolingian UI**

            **Repository:** ${{ github.repository }}
            **Version:** ${{ github.ref_name }}

            ${{ fromJson(steps.get_release.outputs.result).body }}

            **Release:** https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
            **Manifest URL:** https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/module.json
